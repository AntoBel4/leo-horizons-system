# ============================================
# docker-compose.yml — RÉFÉRENCE Leo Horizons
# ============================================
# Ce fichier documente la configuration Docker du VPS.
# Il ne remplace PAS le docker-compose existant dans ~/n8n-docker/
# qui gère l'ensemble des services (n8n, Caddy, Cloudflare, etc.).
#
# Pour modifier la config VPS, éditer : ~/n8n-docker/docker-compose.yml
# ============================================

services:
  # ===========================================
  # OpenClaw (Leo) — Assistant IA
  # Container: openclaw | Port interne: 18789 (loopback only)
  # URL: leo.estarellas.online
  # NOTE: OpenClaw bind à 127.0.0.1 uniquement.
  #       Le proxy socat expose le port sur le réseau Docker.
  # ===========================================
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    env_file:
      - ./openclaw-config/.env
    volumes:
      - openclaw_config:/var/openclaw/config
      - openclaw_data:/var/openclaw/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # OpenClaw Proxy — Expose port sur réseau Docker
  # Partage le réseau d'OpenClaw (network_mode: container)
  # Caddy pointe vers openclaw:18790
  # ===========================================
  openclaw-proxy:
    image: alpine/socat
    container_name: openclaw-proxy
    restart: unless-stopped
    network_mode: "container:openclaw"
    depends_on:
      - openclaw
    command: TCP-LISTEN:18790,fork,reuseaddr TCP:127.0.0.1:18789

  # ===========================================
  # n8n Coaching — Orchestration workflows Leo
  # Container: n8n-docker-n8n-coaching-1 | Port: 127.0.0.1:5679
  # URL: coaching.estarellas.online
  # ===========================================
  n8n-coaching:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5679:5678"
    environment:
      - N8N_HOST=coaching.estarellas.online
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://coaching.estarellas.online/
      - GENERIC_TIMEZONE=Europe/Paris
      # Notion Database IDs (config réelle)
      - NOTION_DB_TASKS=47335e51babb4255b5116c22e44d5683
      - NOTION_DB_PROJECTS=2f9f514ea66d81428fe6000cd3860001
      - NOTION_DB_SEASONS=2f9f514ea66d81dd8c8a000cc76558b0
      - NOTION_DB_VICTOIRES=2f9f514ea66d81e5a0da000c0ffcdef3
      - TELEGRAM_CHAT_ID=8572640484
      - NOTION_PAGE_HEALTH=2f9f514ea66d812aa8d2d055e4ae8b03
      - NOTION_PAGE_BUDGET=2f9f514ea66d815dafddd912be688edf
    volumes:
      - n8n_coaching_data:/home/node/.n8n

  # ===========================================
  # Caddy — Reverse Proxy + SSL
  # Gère TOUS les domaines du VPS
  # ===========================================
  caddy:
    image: caddy:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # ===========================================
  # Autres services sur le même VPS (référence)
  # ===========================================
  # n8n (rentrerdesmandats.fr) — port 5678
  # n8n-automation (automation.estarellas.online) — port 5681
  # n8n-expert-local (prospect.estarellas.online) — port 5680
  # cloudflared-tunnel — Cloudflare tunnel
  # prospect-app — port 8501
  # gotenberg — port 3000

volumes:
  openclaw_config:
  openclaw_data:
  n8n_coaching_data:
  caddy_data:
  caddy_config:
