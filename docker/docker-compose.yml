# ============================================
# Docker Compose - Leo Horizons System
# ============================================
#
# Services : OpenClaw (Leo), n8n, Caddy (reverse proxy)
#
# USAGE:
#   cp ../.env.example ../.env  # puis édite avec tes clés
#   docker compose up -d
#   docker compose logs -f openclaw
#
# IMPORTANT:
#   - Image OpenClaw: ghcr.io/openclaw/openclaw (GitHub Container Registry)
#   - network_mode: host est REQUIS car OpenClaw écoute sur 127.0.0.1
#     et ne supporte pas la clé "host" dans la config JSON
#   - Ne PAS utiliser de modèle lourd (Opus) → préférer Haiku 4.5
#   - Vérifier les permissions du volume : chown -R 1000:1000 sur le volume config
#
# ============================================

services:
  # ──────────────────────────────────────────
  # OpenClaw (Leo) - Assistant IA
  # ──────────────────────────────────────────
  # NOTE: OpenClaw écoute toujours sur 127.0.0.1:18789 (codé en dur).
  # On utilise network_mode: host pour que le 127.0.0.1 du conteneur
  # soit le même que celui du VPS. Caddy peut ainsi le joindre.
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=${TIMEZONE:-Europe/Paris}
    volumes:
      - openclaw_config:/home/node/.openclaw

  # ──────────────────────────────────────────
  # n8n - Orchestration des workflows
  # ──────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    network_mode: host
    environment:
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
      - WEBHOOK_TUNNEL_URL=${WEBHOOK_TUNNEL_URL}
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Paris}
      - TZ=${TIMEZONE:-Europe/Paris}
    volumes:
      - n8n_data:/home/node/.n8n

  # ──────────────────────────────────────────
  # Caddy - Reverse Proxy & TLS automatique
  # ──────────────────────────────────────────
  # NOTE: Avec network_mode: host, Caddy accède à OpenClaw
  # via 127.0.0.1:18789 (même réseau hôte).
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

# ──────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────
volumes:
  openclaw_config:
    driver: local
  n8n_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
